<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── Quarter normalise ─────────────────────────────────────────────────────── */
const normQ = v => {
  const s = String(v||"").toLowerCase();
  if(s.includes("1")) return "Q1";
  if(s.includes("2")) return "Q2";
  if(s.includes("3")) return "Q3";
  if(s.includes("4")) return "Q4";
  return "Q1";
};
const normPrio = v => {
  const s = String(v||"").toLowerCase();
  return s.includes("крит") ? "critical" : "high";
};
const normStatus = v => {
  const s = String(v||"").toLowerCase();
  if(s.includes("работ")) return "active";
  if(s.includes("ожид") || s.includes("жд")) return "waiting";
  if(s.includes("выполн")) return "done";
  if(s.includes("риск")) return "risk";
  return "pending";
};

const Q_META = {
  Q1:{bg:"#EBF2FF",stripe:"#2E5FA3",label:"1 квартал"},
  Q2:{bg:"#EDFBF1",stripe:"#1A5C3A",label:"2 квартал"},
  Q3:{bg:"#FFFAEB",stripe:"#B86B00",label:"3 квартал"},
  Q4:{bg:"#FFF0F0",stripe:"#C00000",label:"4 квартал"},
};

const STATUSES = [
  {id:"pending", label:"Не начат",   icon:"⬜", color:"#6B7A99", bg:"#F0F2F7"},
  {id:"active",  label:"В работе",   icon:"🔵", color:"#1456A8", bg:"#E5EEFB"},
  {id:"waiting", label:"Ожидание",   icon:"🟡", color:"#B86B00", bg:"#FFF4D6"},
  {id:"done",    label:"Выполнен",   icon:"🟢", color:"#1A5C3A", bg:"#E2F0E8"},
  {id:"risk",    label:"Под риском", icon:"🔴", color:"#C00000", bg:"#FEE7E7"},
];
const sById = Object.fromEntries(STATUSES.map(s=>[s.id,s]));

/* ── Parse main roadmap sheet ─────────────────────────────────────────────── */
let _uid = 1;
const parseRoadmap = ws => {
  const rows = XLSX.utils.sheet_to_json(ws, {defval:"", header:0});
  return rows
    .filter(r => {
      const q = String(r["Квартал"]||"").trim();
      // skip group-header rows (▶  1 КВАРТАЛ) and empty rows
      return q && !q.startsWith("▶") && (r["Аккаунт"]||r["Объект / Подразделение"]);
    })
    .map(r => ({
      id:       _uid++,
      q:        normQ(r["Квартал"]),
      account:  String(r["Аккаунт"]||"").trim(),
      unit:     String(r["Объект / Подразделение"]||"").trim(),
      lpr:      String(r["Целевые ЛПР"]||"").trim(),
      action:   String(r["Ключевое действие"]||"").trim(),
      kpi:      String(r["Измеримый результат (KPI)"]||"").trim(),
      priority: normPrio(r["Приоритет"]),
      status:   normStatus(r["Статус"]),
      owner:    String(r["Ответственный"]||"").trim(),
      potential:Number(String(r["Потенциал, ₽ млн"]||"0").replace(/[^\d.]/g,""))||0,
      nextDate: String(r["Дата след. шага"]||"").trim(),
      comment:  String(r["Комментарий"]||"").trim(),
    }));
};

/* ── Parse contacts sheet ─────────────────────────────────────────────────── */
const parseContacts = ws => {
  const rows = XLSX.utils.sheet_to_json(ws, {defval:"", header:0});
  return rows
    .filter(r => r["Аккаунт"] && !String(r["Аккаунт"]).includes("ТРЕКЕР"))
    .map(r => ({
      id:       _uid++,
      account:  String(r["Аккаунт"]||"").trim(),
      unit:     String(r["Объект"]||"").trim(),
      name:     String(r["ФИО / Должность"]||"").trim(),
      email:    String(r["Email"]||"—").trim(),
      phone:    String(r["Телефон"]||"—").trim(),
      lastDate: String(r["Последний контакт"]||"").trim(),
      topic:    String(r["Тема"]||"").trim(),
      nextStep: String(r["Следующий шаг"]||"").trim(),
    }));
};

/* ── Export back to xlsx ──────────────────────────────────────────────────── */
const exportXlsx = (rows, contacts) => {
  const wb = XLSX.utils.book_new();

  /* Sheet 1 – Roadmap */
  const hdrs = ["Квартал","Аккаунт","Объект / Подразделение","Целевые ЛПР",
    "Ключевое действие","Измеримый результат (KPI)","Приоритет","Статус",
    "Ответственный","Потенциал, ₽ млн","Дата след. шага","Комментарий"];

  const aoa = [hdrs];
  let lastQ = null;
  rows.forEach(r => {
    if(r.q !== lastQ){
      lastQ = r.q;
      aoa.push([`▶  ${Q_META[r.q].label.toUpperCase()}`,...Array(11).fill("")]);
    }
    aoa.push([
      Q_META[r.q].label,
      r.account, r.unit, r.lpr, r.action, r.kpi,
      r.priority==="critical" ? "🔴 Критический" : "🟡 Высокий",
      sById[r.status]?.icon+" "+sById[r.status]?.label,
      r.owner, r.potential||0, r.nextDate, r.comment,
    ]);
  });
  const ws1 = XLSX.utils.aoa_to_sheet(aoa);
  ws1["!cols"] = [10,14,28,26,32,32,14,14,16,12,14,28].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb, ws1, "Дорожная карта");

  /* Sheet 2 – KPI summary */
  const total = rows.length, done = rows.filter(r=>r.status==="done").length;
  const pot   = rows.reduce((s,r)=>s+(r.potential||0),0);
  const ws2 = XLSX.utils.aoa_to_sheet([
    ["Показатель","Значение"],
    ["Всего инициатив", total],
    ["Выполнено", done],
    ["% выполнения", total?Math.round(done/total*100)+"%":"0%"],
    ["Критических", rows.filter(r=>r.priority==="critical").length],
    ["Под риском", rows.filter(r=>r.status==="risk").length],
    ["Общий потенциал, ₽ млн", pot],
    ["Закрытый потенциал, ₽ млн", rows.filter(r=>r.status==="done").reduce((s,r)=>s+(r.potential||0),0)],
  ]);
  ws2["!cols"] = [{wch:28},{wch:18}];
  XLSX.utils.book_append_sheet(wb, ws2, "KPI Дашборд");

  /* Sheet 3 – Contacts */
  const cHdrs = ["Аккаунт","Объект","ФИО / Должность","Email","Телефон","Последний контакт","Тема","Следующий шаг"];
  const cAoa  = [cHdrs, ...contacts.map(c=>[c.account,c.unit,c.name,c.email,c.phone,c.lastDate,c.topic,c.nextStep])];
  const ws3 = XLSX.utils.aoa_to_sheet(cAoa);
  ws3["!cols"] = [14,26,26,24,14,16,26,28].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb, ws3, "Трекер контактов");

  XLSX.writeFile(wb, "Дорожная_карта_Systeme_экспорт.xlsx");
};

/* ── Inline editable cell ─────────────────────────────────────────────────── */
const EC = ({id, field, val, right, onCommit}) => {
  const [editing, setEditing] = useState(false);
  const [v, setV] = useState(val??"");
  useEffect(()=>setV(val??""),[val]);
  if(editing) return (
    <input autoFocus value={v}
      style={{width:"100%",border:"1.5px solid #2E5FA3",borderRadius:4,padding:"3px 6px",
              fontSize:11,fontFamily:"inherit",background:"#fff"}}
      onChange={e=>setV(e.target.value)}
      onBlur={()=>{setEditing(false);onCommit(field,v);}}
      onKeyDown={e=>{if(e.key==="Enter"){setEditing(false);onCommit(field,v);}
                     if(e.key==="Escape")setEditing(false);}}/>
  );
  return (
    <span onClick={()=>setEditing(true)} title="Нажмите для редактирования"
      style={{display:"block",cursor:"text",borderRadius:3,padding:"2px 3px",margin:"-2px -3px",
              textAlign:right?"right":"left",minHeight:16}}
      onMouseEnter={e=>e.currentTarget.style.background="rgba(46,95,163,.08)"}
      onMouseLeave={e=>e.currentTarget.style.background=""}>
      {v||<span style={{color:"#aaa",fontStyle:"italic"}}>—</span>}
    </span>
  );
};

/* ── Status pill ──────────────────────────────────────────────────────────── */
const SPill = ({row, onSet}) => {
  const [open, setOpen] = useState(false);
  const s = sById[row.status]||STATUSES[0];
  return (
    <div style={{position:"relative"}}>
      <button onClick={e=>{e.stopPropagation();setOpen(!open);}}
        style={{display:"inline-flex",alignItems:"center",gap:4,padding:"3px 9px",
                borderRadius:20,fontSize:10,fontWeight:600,cursor:"pointer",border:"none",
                fontFamily:"inherit",background:s.bg,color:s.color,whiteSpace:"nowrap"}}>
        {s.icon} {s.label} ▾
      </button>
      {open && (
        <div onClick={e=>e.stopPropagation()}
          style={{position:"absolute",zIndex:200,background:"#fff",border:"1.5px solid #DDE3EF",
                  borderRadius:8,boxShadow:"0 8px 24px rgba(0,0,0,.13)",minWidth:155,overflow:"hidden",
                  top:"calc(100% + 4px)",left:0}}>
          {STATUSES.map(o=>(
            <div key={o.id} onClick={()=>{onSet(o.id);setOpen(false);}}
              style={{display:"flex",alignItems:"center",gap:7,padding:"8px 12px",fontSize:11,
                      fontWeight:o.id===row.status?700:400,cursor:"pointer",
                      background:o.id===row.status?"#F0F4FA":"#fff"}}
              onMouseEnter={e=>e.currentTarget.style.background="#F4F7FC"}
              onMouseLeave={e=>e.currentTarget.style.background=o.id===row.status?"#F0F4FA":"#fff"}>
              {o.icon} {o.label} {o.id===row.status&&"✓"}
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

/* ══════════════════════════════════════════════════════════════════════════ */
function App() {
  const [rows,     setRows]     = useState([]);
  const [contacts, setContacts] = useState([]);
  const [tab,      setTab]      = useState("drop");
  const [qF,       setQF]       = useState("all");
  const [acF,      setAcF]      = useState("all");
  const [stF,      setStF]      = useState("all");
  const [search,   setSearch]   = useState("");
  const [modal,    setModal]    = useState(false);
  const [newRow,   setNewRow]   = useState({q:"Q1",priority:"high"});
  const [toast,    setToast]    = useState("");
  const [dragging, setDragging] = useState(false);
  const [fileName, setFileName] = useState("");
  const fileRef = useRef();

  /* persist */
  useEffect(()=>{
    try{
      const r=localStorage.getItem("rm2-rows"),c=localStorage.getItem("rm2-contacts");
      if(r){setRows(JSON.parse(r));setContacts(JSON.parse(c||"[]"));setTab("roadmap");}
    }catch{}
  },[]);
  const saveAll=(r,c)=>{
    try{localStorage.setItem("rm2-rows",JSON.stringify(r));
        localStorage.setItem("rm2-contacts",JSON.stringify(c));}catch{}
  };

  const toast_=(m,d=2400)=>{setToast(m);setTimeout(()=>setToast(""),d);};

  /* ── import ── */
  const importFile = file => {
    if(!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      try{
        const wb    = XLSX.read(e.target.result,{type:"array"});
        const wsName= wb.SheetNames.find(n=>n.toLowerCase().includes("карта")||n===wb.SheetNames[0]);
        const cName = wb.SheetNames.find(n=>n.toLowerCase().includes("контакт"));
        const r = parseRoadmap(wb.Sheets[wsName]);
        const c = cName ? parseContacts(wb.Sheets[cName]) : [];
        if(!r.length){toast_("❌ Не удалось распознать строки");return;}
        setRows(r); setContacts(c); saveAll(r,c);
        setTab("roadmap"); setFileName(file.name);
        toast_(`✅ Загружено ${r.length} инициатив и ${c.length} контактов`);
      }catch(err){toast_("❌ Ошибка: "+err.message);}
    };
    reader.readAsArrayBuffer(file);
  };

  /* ── mutations ── */
  const updateRow=(id,field,val)=>{
    const u=rows.map(r=>r.id===id?{...r,[field]:field==="potential"?Number(val)||0:val}:r);
    setRows(u);saveAll(u,contacts);
  };
  const setStatus=(id,status)=>{
    const u=rows.map(r=>r.id===id?{...r,status}:r);
    setRows(u);saveAll(u,contacts);
    toast_(`Статус → ${sById[status].label}`);
  };
  const deleteRow=id=>{
    if(!confirm("Удалить эту инициативу?"))return;
    const u=rows.filter(r=>r.id!==id);setRows(u);saveAll(u,contacts);toast_("Удалено");
  };
  const addRow=()=>{
    const r={id:_uid++,...newRow,status:"pending",comment:newRow.comment||"",
             potential:Number(newRow.potential)||0};
    const u=[...rows,r];setRows(u);saveAll(u,contacts);
    setModal(false);setNewRow({q:"Q1",priority:"high"});toast_("✅ Добавлено");
  };
  const updateContact=(id,field,val)=>{
    const u=contacts.map(c=>c.id===id?{...c,[field]:val}:c);
    setContacts(u);saveAll(rows,u);
  };

  /* ── derived ── */
  const total=rows.length, done=rows.filter(r=>r.status==="done").length,
        pot=rows.reduce((s,r)=>s+(r.potential||0),0), pct=total?Math.round(done/total*100):0,
        activeN=rows.filter(r=>r.status==="active").length,
        risk=rows.filter(r=>r.status==="risk").length;
  const accounts=[...new Set(rows.map(r=>r.account))];
  const visible=rows.filter(r=>
    (qF==="all"||r.q===qF)&&(acF==="all"||r.account===acF)&&(stF==="all"||r.status===stF)&&
    (!search||[r.account,r.unit,r.lpr,r.action,r.kpi,r.comment,r.owner].join(" ").toLowerCase().includes(search.toLowerCase()))
  );
  const byQ=["Q1","Q2","Q3","Q4"].map(q=>({q,rows:visible.filter(r=>r.q===q),all:rows.filter(r=>r.q===q)})).filter(g=>g.rows.length);

  /* ════════════════════════════════════════════════════════════════════════ */
  /* DROP ZONE */
  const DropZone = () => (
    <div style={{padding:40,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",flex:1}}>
      <div
        onDragOver={e=>{e.preventDefault();setDragging(true);}}
        onDragLeave={()=>setDragging(false)}
        onDrop={e=>{e.preventDefault();setDragging(false);importFile(e.dataTransfer.files[0]);}}
        onClick={()=>fileRef.current.click()}
        style={{border:`2.5px dashed ${dragging?"#2E5FA3":"#7EA8E0"}`,borderRadius:16,
                padding:"60px 40px",textAlign:"center",cursor:"pointer",transition:"all .2s",
                background:dragging?"rgba(46,95,163,.08)":"rgba(46,95,163,.03)",maxWidth:500,width:"100%"}}>
        <div style={{fontSize:52,marginBottom:16}}>📊</div>
        <div style={{fontSize:20,fontWeight:700,color:"#1A2C4E",marginBottom:8}}>
          Перетащите файл Excel сюда
        </div>
        <div style={{fontSize:13,color:"#6B7A99",marginBottom:20}}>
          Или нажмите для выбора файла · Поддерживается <b>.xlsx</b> от Systeme v2
        </div>
        <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
          <button style={{padding:"9px 20px",background:"#2E5FA3",color:"#fff",border:"none",
                          borderRadius:7,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}
            onClick={e=>{e.stopPropagation();fileRef.current.click();}}>
            📂 Выбрать файл
          </button>
          {localStorage.getItem("rm2-rows") &&
            <button style={{padding:"9px 20px",background:"#1A5C3A",color:"#fff",border:"none",
                            borderRadius:7,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}
              onClick={e=>{e.stopPropagation();
                const r=JSON.parse(localStorage.getItem("rm2-rows"));
                const c=JSON.parse(localStorage.getItem("rm2-contacts")||"[]");
                setRows(r);setContacts(c);setTab("roadmap");toast_("Восстановлено из кэша");}}>
              ♻ Последняя сессия
            </button>}
        </div>
        <div style={{marginTop:16,fontSize:11,color:"#aaa"}}>
          Данные сохраняются локально в браузере
        </div>
      </div>
    </div>
  );

  /* ════════════════════════════════════════════════════════════════════════ */
  return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",background:"#F4F7FC"}}>
      <input type="file" accept=".xlsx,.xls" ref={fileRef} style={{display:"none"}}
        onChange={e=>importFile(e.target.files[0])}/>

      {/* HEADER */}
      <div style={{background:"#1A2C4E",padding:"13px 20px",display:"flex",alignItems:"center",
                   justifyContent:"space-between",gap:12,flexWrap:"wrap"}}>
        <div>
          <div style={{fontSize:10,fontWeight:700,letterSpacing:".12em",color:"#7EA8E0",textTransform:"uppercase"}}>Systeme Electric</div>
          <div style={{fontSize:17,fontWeight:700,color:"#fff"}}>Дорожная карта продаж 2026</div>
          <div style={{fontSize:11,color:"#7EA8E0",marginTop:1}}>
            {fileName ? `📎 ${fileName}` : "Газпром нефть · ЛУКОЙЛ"}
          </div>
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <button onClick={()=>fileRef.current.click()}
            style={{padding:"6px 13px",background:"rgba(255,255,255,.12)",color:"#fff",border:"none",
                    borderRadius:6,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
            📂 Импорт xlsx
          </button>
          {rows.length>0 && <>
            <button onClick={()=>exportXlsx(rows,contacts)}
              style={{padding:"6px 13px",background:"#1A5C3A",color:"#fff",border:"none",
                      borderRadius:6,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
              ⬇ Экспорт xlsx
            </button>
            <button onClick={()=>{setModal(true);setNewRow({q:"Q1",priority:"high"});}}
              style={{padding:"6px 13px",background:"#2E5FA3",color:"#fff",border:"none",
                      borderRadius:6,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
              + Добавить строку
            </button>
          </>}
        </div>
      </div>

      {tab==="drop" ? <DropZone/> : <>
        {/* TABS */}
        <div style={{background:"#fff",borderBottom:"1.5px solid #DDE3EF",display:"flex",padding:"0 20px",overflowX:"auto"}}>
          {[["roadmap","📋 Карта инициатив"],["gantt","📅 Временная шкала"],["kpi","📊 KPI Дашборд"],["contacts","👥 Трекер контактов"]].map(([id,l])=>(
            <div key={id} onClick={()=>setTab(id)}
              style={{padding:"11px 15px",fontSize:13,fontWeight:tab===id?600:500,
                      color:tab===id?"#2E5FA3":"#6B7A99",cursor:"pointer",whiteSpace:"nowrap",
                      borderBottom:tab===id?"2.5px solid #2E5FA3":"2.5px solid transparent",
                      marginBottom:-1.5,transition:"all .15s"}}>
              {l}
            </div>
          ))}
        </div>

        {/* KPI STRIP */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(125px,1fr))",gap:10,padding:"12px 20px"}}>
          {[
            {v:`${pct}%`,  l:"Выполнено",      accent:true},
            {v:done,       l:"Закрыто задач"},
            {v:activeN,    l:"В работе"},
            {v:risk,       l:"Под риском",      red:true},
            {v:`${pot.toLocaleString("ru")} ₽м`,l:"Потенциал"},
            {v:total,      l:"Инициатив"},
          ].map((k,i)=>(
            <div key={i} style={{background:k.accent?"#1A2C4E":"#fff",border:`1.5px solid ${k.red&&risk>0?"#C00000":"#DDE3EF"}`,borderRadius:10,padding:"12px 14px"}}>
              <div style={{fontSize:22,fontWeight:700,color:k.accent?"#fff":k.red&&risk>0?"#C00000":"#1A2C4E",lineHeight:1}}>{k.v}</div>
              <div style={{fontSize:10,color:k.accent?"#7EA8E0":"#6B7A99",marginTop:4}}>{k.l}</div>
              {k.accent&&<div style={{background:"rgba(255,255,255,.2)",borderRadius:4,height:4,overflow:"hidden",marginTop:8}}>
                <div style={{width:`${pct}%`,height:"100%",background:"#4A9EE8",borderRadius:4,transition:"width .5s"}}/>
              </div>}
            </div>
          ))}
        </div>

        {/* ── ROADMAP ── */}
        {tab==="roadmap" && <>
          <div style={{display:"flex",gap:8,padding:"10px 20px",background:"#fff",borderBottom:"1px solid #DDE3EF",flexWrap:"wrap",alignItems:"center"}}>
            <span style={{fontSize:10,fontWeight:700,color:"#6B7A99",textTransform:"uppercase",letterSpacing:".06em"}}>Фильтр</span>
            {[
              [qF,setQF,[["all","Все кварталы"],["Q1","1 квартал"],["Q2","2 квартал"],["Q3","3 квартал"],["Q4","4 квартал"]]],
              [acF,setAcF,[["all","Все аккаунты"],...accounts.map(a=>[a,a])]],
              [stF,setStF,[["all","Все статусы"],...STATUSES.map(s=>[s.id,s.icon+" "+s.label])]],
            ].map(([val,set,opts],i)=>(
              <select key={i} value={val} onChange={e=>set(e.target.value)}
                style={{height:30,padding:"0 8px",border:"1.5px solid #DDE3EF",borderRadius:6,fontSize:11,color:"#1C1C2E",background:"#fff",fontFamily:"inherit",cursor:"pointer"}}>
                {opts.map(([v,l])=><option key={v} value={v}>{l}</option>)}
              </select>
            ))}
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Поиск…"
              style={{height:30,padding:"0 8px",border:"1.5px solid #DDE3EF",borderRadius:6,fontSize:11,fontFamily:"inherit",width:180}}/>
            <span style={{flex:1}}/>
            <span style={{fontSize:10,color:"#6B7A99"}}>Показано {visible.length} / {total}</span>
          </div>

          <div style={{padding:"0 20px 32px",overflowX:"auto"}}>
            {byQ.map(({q,rows:qr,all})=>{
              const qDone=all.filter(r=>r.status==="done").length;
              const qPct=all.length?Math.round(qDone/all.length*100):0;
              const {bg,stripe,label}=Q_META[q];
              return (
                <div key={q} style={{marginTop:16,borderRadius:"8px 8px 0 0",overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,padding:"7px 14px",background:stripe,color:"#fff",fontSize:11,fontWeight:700,letterSpacing:".06em",textTransform:"uppercase"}}>
                    <span>{label.toUpperCase()}</span>
                    <span style={{background:"rgba(255,255,255,.25)",borderRadius:4,padding:"1px 7px",fontSize:10}}>{qr.length}</span>
                    <span style={{marginLeft:"auto",fontSize:10}}>{qPct}% выполнено</span>
                    <div style={{width:70,background:"rgba(255,255,255,.25)",borderRadius:4,height:3,overflow:"hidden"}}>
                      <div style={{width:`${qPct}%`,height:"100%",background:"rgba(255,255,255,.9)",transition:"width .4s"}}/>
                    </div>
                  </div>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,background:"#fff"}}>
                    <thead>
                      <tr style={{background:"#F0F4FA"}}>
                        {["Аккаунт","Объект / Подразделение","Целевые ЛПР","Ключевое действие","Измеримый результат (KPI)","Приоритет","Статус","Ответственный","₽ млн","Дата","Комментарий",""].map((h,i)=>(
                          <th key={i} style={{padding:"8px 10px",textAlign:"left",fontSize:9,fontWeight:700,color:"#6B7A99",textTransform:"uppercase",letterSpacing:".06em",borderBottom:"1.5px solid #DDE3EF",whiteSpace:"nowrap",
                            width:[105,185,160,null,null,85,135,100,65,85,155,28][i]||"auto"}}>
                            {h}
                          </th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {qr.map(row=>(
                        <tr key={row.id} style={{background:row.status==="done"?"#E8F5EC":row.status==="risk"?"#FEF0F0":bg}}>
                          <td style={{padding:"8px 10px",borderBottom:"1px solid #DDE3EF",verticalAlign:"top",fontWeight:600,fontSize:10}}>{row.account}</td>
                          {[["unit",null],["lpr","#6B7A99"],["action",null],["kpi","#4A6FA5"]].map(([f,clr])=>(
                            <td key={f} style={{padding:"8px 10px",borderBottom:"1px solid #DDE3EF",verticalAlign:"top",color:clr||"inherit",lineHeight:1.4}}>
                              <EC id={row.id} field={f} val={row[f]} onCommit={updateRow}/>
                            </td>
                          ))}
                          <td style={{padding:"8px 10px",borderBottom:"1px solid #DDE3EF",verticalAlign:"top"}}>
                            <span style={{display:"inline-flex",alignItems:"center",padding:"2px 7px",borderRadius:20,fontSize:9,fontWeight:700,
                              background:row.priority==="critical"?"#FEE7E7":"#FFF4D6",
                              color:row.priority==="critical"?"#C00000":"#B86B00"}}>
                              {row.priority==="critical"?"🔴 Крит.":"🟡 Выс."}
                            </span>
                          </td>
                          <td style={{padding:"8px 10px",borderBottom:"1px solid #DDE3EF",verticalAlign:"top"}}>
                            <SPill row={row} onSet={s=>setStatus(row.id,s)}/>
                          </td>
                          <td style={{padding:"8px 10px",borderBottom:"1px solid #DDE3EF",verticalAlign:"top"}}>
                            <EC id={row.id} field="owner" val={row.owner} onCommit={updateRow}/>
                          </td>
                          <td style={{padding:"8px 10px",borderBottom:"1px solid #DDE3EF",verticalAlign:"top",textAlign:"right",fontWeight:600,color:row.potential>0?"#1A2C4E":"#aaa"}}>
                            <EC id={row.id} field="potential" val={row.potential>0?String(row.potential):""} right onCommit={updateRow}/>
                          </td>
                          <td style={{padding:"8px 10px",borderBottom:"1px solid #DDE3EF",verticalAlign:"top",color:"#6B7A99",fontSize:10}}>
                            <EC id={row.id} field="nextDate" val={row.nextDate} onCommit={updateRow}/>
                          </td>
                          <td style={{padding:"8px 10px",borderBottom:"1px solid #DDE3EF",verticalAlign:"top"}}>
                            <EC id={row.id} field="comment" val={row.comment} onCommit={updateRow}/>
                          </td>
                          <td style={{padding:"8px 10px",borderBottom:"1px solid #DDE3EF",verticalAlign:"top",textAlign:"center"}}>
                            <span style={{cursor:"pointer",color:"#C00000",fontSize:12,fontWeight:700}} onClick={()=>deleteRow(row.id)} title="Удалить">✕</span>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              );
            })}
          </div>
        </>}

        {/* ── GANTT ── */}
        {tab==="gantt" && (
          <div style={{padding:"14px 20px",overflowX:"auto"}}>
            <div style={{display:"grid",gridTemplateColumns:"195px repeat(4,1fr)",borderBottom:"2px solid #DDE3EF",minWidth:700}}>
              <div style={{padding:"7px 10px",fontSize:10,fontWeight:700,color:"#6B7A99"}}>Инициатива</div>
              {["Q1 · Янв–Мар","Q2 · Апр–Июн","Q3 · Июл–Сен","Q4 · Окт–Дек"].map((h,i)=>(
                <div key={i} style={{padding:"7px 10px",fontSize:10,fontWeight:700,color:"#6B7A99",
                  textTransform:"uppercase",letterSpacing:".05em",borderLeft:"1px solid #DDE3EF",
                  background:Object.values(Q_META)[i].bg}}>{h}</div>
              ))}
            </div>
            {rows.map(row=>{
              const qi=["Q1","Q2","Q3","Q4"].indexOf(row.q);
              const s=sById[row.status];
              return (
                <div key={row.id} style={{display:"grid",gridTemplateColumns:"195px 1fr",
                  borderBottom:"1px solid #DDE3EF",minHeight:32,alignItems:"center",minWidth:700}}>
                  <div style={{fontSize:10,padding:"4px 10px 4px 0",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                    <span style={{fontSize:8,fontWeight:700,color:"#6B7A99",marginRight:3}}>{(row.account||"").slice(0,3).toUpperCase()}</span>
                    {row.unit}
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)"}}>
                    {[0,1,2,3].map(ci=>(
                      <div key={ci} style={{borderLeft:"1px solid #DDE3EF",minHeight:32,display:"flex",alignItems:"center",padding:"3px 5px",
                        background:ci===qi?Object.values(Q_META)[ci].bg:"transparent"}}>
                        {ci===qi&&(
                          <div style={{height:18,borderRadius:4,display:"flex",alignItems:"center",padding:"0 7px",
                            fontSize:9,fontWeight:600,color:"#fff",overflow:"hidden",textOverflow:"ellipsis",
                            whiteSpace:"nowrap",width:"95%",
                            background:Object.values(Q_META)[ci].stripe,
                            opacity:row.status==="risk"?.5:row.status==="done"?1:.85}}>
                            {s?.icon} {(row.action||"").slice(0,26)}…
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* ── KPI DASHBOARD ── */}
        {tab==="kpi" && (
          <div style={{padding:20}}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:14,marginBottom:20}}>
              {[
                {v:total,l:"Всего инициатив",i:"📋"},
                {v:rows.filter(r=>r.priority==="critical").length,l:"Критических",i:"🔴"},
                {v:done,l:"Выполнено",i:"✅"},
                {v:activeN,l:"В работе",i:"🔵"},
                {v:risk,l:"Под риском",i:"⚠️"},
                {v:`${pot.toLocaleString("ru")} ₽м`,l:"Общий потенциал",i:"💰"},
              ].map((k,i)=>(
                <div key={i} style={{background:"#fff",border:"1.5px solid #DDE3EF",borderRadius:10,padding:18}}>
                  <div style={{fontSize:20,marginBottom:4}}>{k.i}</div>
                  <div style={{fontSize:24,fontWeight:700,color:"#1A2C4E",lineHeight:1}}>{k.v}</div>
                  <div style={{fontSize:10,color:"#6B7A99",marginTop:4}}>{k.l}</div>
                </div>
              ))}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
              {/* По кварталам */}
              <div style={{background:"#fff",border:"1.5px solid #DDE3EF",borderRadius:10,padding:18}}>
                <div style={{fontWeight:700,fontSize:13,marginBottom:14,color:"#1A2C4E"}}>Прогресс по кварталам</div>
                {["Q1","Q2","Q3","Q4"].map(q=>{
                  const qR=rows.filter(r=>r.q===q),qD=qR.filter(r=>r.status==="done").length;
                  const qP=qR.length?Math.round(qD/qR.length*100):0;
                  const {stripe,label}=Q_META[q];
                  return (
                    <div key={q} style={{marginBottom:12}}>
                      <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:4}}>
                        <span style={{fontWeight:600}}>{label}</span>
                        <span style={{color:"#6B7A99"}}>{qD}/{qR.length} · {qP}%</span>
                      </div>
                      <div style={{background:"#DDE3EF",borderRadius:4,height:7,overflow:"hidden"}}>
                        <div style={{width:`${qP}%`,height:"100%",background:stripe,borderRadius:4,transition:"width .5s"}}/>
                      </div>
                    </div>
                  );
                })}
              </div>
              {/* По статусам */}
              <div style={{background:"#fff",border:"1.5px solid #DDE3EF",borderRadius:10,padding:18}}>
                <div style={{fontWeight:700,fontSize:13,marginBottom:14,color:"#1A2C4E"}}>Распределение по статусам</div>
                {STATUSES.map(s=>{
                  const cnt=rows.filter(r=>r.status===s.id).length;
                  const p=rows.length?Math.round(cnt/rows.length*100):0;
                  return (
                    <div key={s.id} style={{marginBottom:10}}>
                      <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:3}}>
                        <span style={{fontWeight:600,color:s.color}}>{s.icon} {s.label}</span>
                        <span style={{color:"#6B7A99"}}>{cnt} ({p}%)</span>
                      </div>
                      <div style={{background:"#DDE3EF",borderRadius:4,height:5,overflow:"hidden"}}>
                        <div style={{width:`${p}%`,height:"100%",background:s.color,borderRadius:4,transition:"width .5s"}}/>
                      </div>
                    </div>
                  );
                })}
              </div>
              {/* Потенциал */}
              <div style={{background:"#fff",border:"1.5px solid #DDE3EF",borderRadius:10,padding:18}}>
                <div style={{fontWeight:700,fontSize:13,marginBottom:14,color:"#1A2C4E"}}>Потенциал по аккаунтам</div>
                {accounts.map(ac=>{
                  const acPot=rows.filter(r=>r.account===ac).reduce((s,r)=>s+(r.potential||0),0);
                  const acP=pot?Math.round(acPot/pot*100):0;
                  return (
                    <div key={ac} style={{marginBottom:12}}>
                      <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:4}}>
                        <span style={{fontWeight:600}}>{ac}</span>
                        <span style={{color:"#6B7A99"}}>{acPot.toLocaleString("ru")} ₽м · {acP}%</span>
                      </div>
                      <div style={{background:"#DDE3EF",borderRadius:4,height:7,overflow:"hidden"}}>
                        <div style={{width:`${acP}%`,height:"100%",background:"#2E5FA3",borderRadius:4}}/>
                      </div>
                    </div>
                  );
                })}
              </div>
              {/* Ответственные */}
              <div style={{background:"#fff",border:"1.5px solid #DDE3EF",borderRadius:10,padding:18}}>
                <div style={{fontWeight:700,fontSize:13,marginBottom:14,color:"#1A2C4E"}}>Нагрузка по ответственным</div>
                {[...new Set(rows.map(r=>r.owner))].filter(Boolean).map(o=>{
                  const oR=rows.filter(r=>r.owner===o);
                  const oD=oR.filter(r=>r.status==="done").length;
                  return (
                    <div key={o} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10,fontSize:11}}>
                      <div style={{width:28,height:28,borderRadius:"50%",background:"#2E5FA3",color:"#fff",
                        display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:11,flexShrink:0}}>
                        {(o||"?")[0]}
                      </div>
                      <div>
                        <div style={{fontWeight:600}}>{o}</div>
                        <div style={{color:"#6B7A99",fontSize:10}}>{oR.length} инициатив · {oD} выполнено</div>
                      </div>
                      <div style={{marginLeft:"auto",display:"flex",gap:3}}>
                        {oR.slice(0,5).map(r=>(
                          <div key={r.id} title={r.action}
                            style={{width:8,height:8,borderRadius:"50%",background:sById[r.status]?.color||"#ccc"}}/>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        )}

        {/* ── CONTACTS ── */}
        {tab==="contacts" && (
          <div style={{padding:"14px 20px"}}>
            {contacts.length===0
              ? <div style={{textAlign:"center",padding:60,color:"#6B7A99"}}>
                  <div style={{fontSize:32,marginBottom:8}}>👥</div>
                  <div style={{fontSize:15,fontWeight:600}}>Нет контактов</div>
                  <div style={{fontSize:12,marginTop:4}}>Они загружаются из листа «Трекер контактов» вашего Excel-файла</div>
                </div>
              : <>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,background:"#fff",borderRadius:8,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
                  <thead>
                    <tr style={{background:"#1A2C4E"}}>
                      {["Аккаунт","Объект","ФИО / Должность","Email","Телефон","Последний контакт","Тема","Следующий шаг"].map((h,i)=>(
                        <th key={i} style={{padding:"9px 10px",textAlign:"left",fontSize:9,fontWeight:700,color:"#7EA8E0",textTransform:"uppercase",letterSpacing:".06em"}}>
                          {h}
                        </th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {contacts.map((c,i)=>(
                      <tr key={c.id} style={{background:i%2===0?"#fff":"#F8FAFD"}}>
                        <td style={{padding:"8px 10px",borderBottom:"1px solid #DDE3EF",fontWeight:600,fontSize:10}}>
                          <span style={{display:"inline-flex",alignItems:"center",gap:5}}>
                            <span style={{width:20,height:20,borderRadius:"50%",background:c.account?.includes("Газпром")?"#2E5FA3":"#4A6FA5",color:"#fff",display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,flexShrink:0}}>
                              {(c.account||"?")[0]}
                            </span>
                            {c.account}
                          </span>
                        </td>
                        {[["unit"],["name",null,true],["email","#1456A8"],["phone"],["lastDate","#6B7A99"],["topic",null,true],["nextStep","#1A5C3A",true]].map(([f,clr,bold])=>(
                          <td key={f} style={{padding:"8px 10px",borderBottom:"1px solid #DDE3EF",verticalAlign:"top",color:clr||"inherit",fontWeight:bold?600:400,lineHeight:1.4}}>
                            <EC id={c.id} field={f} val={c[f]} onCommit={updateContact}/>
                          </td>
                        ))}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </>
            }
          </div>
        )}
      </>}

      {/* ── ADD ROW MODAL ── */}
      {modal && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center"}}
          onClick={()=>setModal(false)}>
          <div style={{background:"#fff",borderRadius:12,padding:24,width:560,maxWidth:"95vw",maxHeight:"90vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,.25)"}}
            onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:16,fontWeight:700,color:"#1A2C4E",marginBottom:18}}>➕ Новая инициатива</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              {[
                {l:"Квартал",f:"q",type:"select",opts:[["Q1","1 квартал"],["Q2","2 квартал"],["Q3","3 квартал"],["Q4","4 квартал"]]},
                {l:"Аккаунт",f:"account"},
                {l:"Объект / Подразделение",f:"unit",full:true},
                {l:"Целевые ЛПР",f:"lpr",full:true},
                {l:"Ключевое действие",f:"action",full:true,textarea:true},
                {l:"Измеримый результат (KPI)",f:"kpi",full:true,textarea:true},
                {l:"Приоритет",f:"priority",type:"select",opts:[["critical","🔴 Критический"],["high","🟡 Высокий"]]},
                {l:"Ответственный",f:"owner"},
                {l:"Потенциал, ₽ млн",f:"potential",type:"number"},
                {l:"Дата следующего шага",f:"nextDate",placeholder:"дд.мм.гггг"},
                {l:"Комментарий",f:"comment",full:true,textarea:true},
              ].map(fi=>(
                <div key={fi.f} style={{display:"flex",flexDirection:"column",gap:4,gridColumn:fi.full?"1/-1":"auto"}}>
                  <label style={{fontSize:10,fontWeight:700,color:"#6B7A99",textTransform:"uppercase",letterSpacing:".04em"}}>{fi.l}</label>
                  {fi.type==="select"
                    ? <select value={newRow[fi.f]||""} onChange={e=>setNewRow(p=>({...p,[fi.f]:e.target.value}))}
                        style={{height:34,padding:"0 8px",border:"1.5px solid #DDE3EF",borderRadius:6,fontSize:12,fontFamily:"inherit",color:"#1C1C2E"}}>
                        {fi.opts.map(([v,l])=><option key={v} value={v}>{l}</option>)}
                      </select>
                    : fi.textarea
                    ? <textarea value={newRow[fi.f]||""} onChange={e=>setNewRow(p=>({...p,[fi.f]:e.target.value}))} placeholder={fi.placeholder}
                        style={{padding:"7px 8px",border:"1.5px solid #DDE3EF",borderRadius:6,fontSize:12,fontFamily:"inherit",color:"#1C1C2E",resize:"vertical",minHeight:56}}/>
                    : <input type={fi.type||"text"} value={newRow[fi.f]||""} placeholder={fi.placeholder} onChange={e=>setNewRow(p=>({...p,[fi.f]:e.target.value}))}
                        style={{height:34,padding:"0 8px",border:"1.5px solid #DDE3EF",borderRadius:6,fontSize:12,fontFamily:"inherit",color:"#1C1C2E"}}/>}
                </div>
              ))}
            </div>
            <div style={{display:"flex",gap:8,marginTop:18,justifyContent:"flex-end"}}>
              <button onClick={()=>setModal(false)}
                style={{padding:"8px 16px",background:"#F0F2F7",color:"#1C1C2E",border:"none",borderRadius:7,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
                Отмена
              </button>
              <button onClick={addRow}
                style={{padding:"8px 16px",background:"#2E5FA3",color:"#fff",border:"none",borderRadius:7,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
                Добавить
              </button>
            </div>
          </div>
        </div>
      )}

      {toast && (
        <div style={{position:"fixed",bottom:20,left:"50%",transform:"translateX(-50%)",
          background:"#1A2C4E",color:"#fff",padding:"9px 18px",borderRadius:8,fontSize:12,
          fontWeight:500,zIndex:999,boxShadow:"0 4px 16px rgba(0,0,0,.2)",pointerEvents:"none"}}>
          {toast}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
